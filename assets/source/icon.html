<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Enterprise Publishing — icon</title>
<link rel="stylesheet" href="identity.css">
<style>
	/*
	 * Rendered at 128 and 256. Every dimension is a percentage of the tile, so
	 * the small size is the large size scaled rather than a second drawing
	 * tuned for one and mushing at the other.
	 *
	 * The mark is a pilcrow — the oldest editorial mark there is — struck into
	 * a seal disc. Editorial craft inside an institutional seal, which is
	 * exactly what the plugin is. A glyph rather than an illustration, because
	 * a glyph is still a glyph at 128px.
	 */
	html, body { width: 100%; height: 100%; }
	body { container-type: size; background: transparent; }

	.tile {
		position: relative;
		width: 100%;
		height: 100%;
		border-radius: var(--r-tile);
		background:
			radial-gradient(120% 120% at 22% 12%, #1e7050 0%, transparent 58%),
			linear-gradient(150deg, #17603f 0%, var(--seal) 46%, var(--seal-deep) 100%);
		display: grid;
		place-items: center;
		overflow: hidden;
	}

	/* Outer rim: the tile's own edge, so it reads as struck metal, not a sticker. */
	.tile::before {
		content: '';
		position: absolute;
		inset: 3.9%;
		border-radius: 19.2%;
		border: 1cqw solid rgba(244, 239, 228, 0.24);
	}

	/* The seal disc the mark is struck into. */
	.seal {
		position: relative;
		width: 63%;
		aspect-ratio: 1;
		border-radius: 50%;
		background: rgba(244, 239, 228, 0.11);
		border: 1.1cqw solid rgba(244, 239, 228, 0.42);
		display: grid;
		place-items: center;
	}

	.mark {
		font-family: var(--display);
		font-size: 46cqw;
		font-weight: 500;
		line-height: 1;
		color: var(--on-seal);
		/* Optical centring inside the disc: the glyph box carries descender space the mark itself does not use. */
		transform: translate(2%, 4%);
	}
</style>
</head>
<body>
	<div class="tile" role="img" aria-label="Enterprise Publishing">
		<div class="seal"><span class="mark">&para;</span></div>
	</div>
</body>
</html>
